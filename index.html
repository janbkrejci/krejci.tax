<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Krejčí.TAX - připravujeme nový web. Kontakt: jan zavináč krejci tečka tax."
    >
    <title>Krejčí.TAX</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f6f4ef;
        --text: #1c2420;
        --muted: #5c6761;
        --accent: #164e3c;
        --accent-hover: #0f3f30;
        --accent-soft: #dce9e2;
        --shadow: 0 24px 70px rgba(28, 36, 32, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(22, 78, 60, 0.14), transparent 34rem),
          linear-gradient(135deg, #fbfaf6 0%, var(--background) 100%);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      .panel {
        width: min(100%, 760px);
        padding: clamp(32px, 7vw, 68px);
        border: 1px solid rgba(223, 216, 202, 0.9);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 26px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 34px;
        height: 1px;
        background: currentColor;
        content: "";
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(2.7rem, 8vw, 5.4rem);
        line-height: 0.95;
        font-weight: 780;
      }

      .lead {
        max-width: 560px;
        margin: 28px 0 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2.2vw, 1.35rem);
        line-height: 1.6;
      }

      .contact {
        display: grid;
        gap: 8px;
        margin: 36px 0;
        padding: 22px;
        border-left: 4px solid var(--accent);
        background: var(--accent-soft);
      }

      .contact span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .contact strong {
        font-size: clamp(1.08rem, 2.5vw, 1.3rem);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        transition:
          background-color 160ms ease,
          transform 160ms ease;
      }

      .button:hover,
      .button:focus-visible {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .thanks {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 560px) {
        main {
          align-items: stretch;
          padding: 0;
        }

        .panel {
          display: flex;
          min-height: 100vh;
          flex-direction: column;
          justify-content: center;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="title">
        <p class="eyebrow">Krejčí.TAX</p>
        <h1 id="title">Na webu se pracuje</h1>
        <p class="lead">
          Připravuji nové stránky. Mezitím mě můžete kontaktovat e-mailem.
        </p>

        <div class="contact" aria-label="Kontakt">
          <span>E-mail</span>
          <strong>jan (zavináč) krejci (tečka) tax</strong>
        </div>

        <div class="actions">
          <a class="button" href="https://www.kdpcr.cz/danovy-poradce/bc-jan-krejci">
            Jan Krejčí, daňový poradce č. reg. 5624
          </a>
          <p class="thanks">Děkuji za pochopení.</p>
        </div>
      </section>
    </main>
  </body>
</html>
